<div class="game-wrapper">
  
  <div class="score-section">
    <app-score-board [score]="snakeEngine.score" [highScore]="highScore"></app-score-board>
  </div>

  <div class="board-section">
    <app-game-board 
      [matriz]="snakeEngine.board" 
      [direction]="snakeEngine.direction">
    </app-game-board>
  </div>

  <app-game-over 
    *ngIf="snakeEngine.gameOver" 
    [finalScore]="snakeEngine.score"
    (onRetry)="reiniciarJogo()">
  </app-game-over>

</div>
