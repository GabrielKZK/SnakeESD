<div class="grid-tabuleiro">
  <div *ngFor="let linha of matriz; let i = index; trackBy: trackByIndex" class="linha">
    <div *ngFor="let celula of linha; let j = index; trackBy: trackByIndex" class="celula" [ngClass]="{
           'vazia': celula === 0,
           'corpo': celula === 1,
           'comida': celula === 2,
           'cabeca': celula === 3
         }" [style.transform]="celula === 3 ? getHeadRotation() : 'none'">
    </div>
  </div>
</div>
